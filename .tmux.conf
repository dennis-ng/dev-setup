# Low escape-time so Ctrl+Arrow etc. aren't misread as Escape + keys
set -sg escape-time 10

# Enable focus events so Neovim gets FocusLost/FocusGained
set -g focus-events on

# Enable true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"

# Mouse
set -g mouse on


# Kanagawa Wave pane styling - only bg differs to preserve text colors
set -g window-active-style 'fg=default,bg=#1F1F28'
set -g window-style 'fg=default,bg=#363646'

# Pane borders - Kanagawa colors
set -g pane-border-style 'fg=#54546D'
set -g pane-active-border-style 'fg=#7E9CD8'

# Pass through extended keys (CSI u sequences) so apps like Claude Code get Shift+Enter
set -g extended-keys always
set -g extended-keys-format csi-u
set -as terminal-features 'xterm*:extkeys'

set-option -g history-limit 5000

# tmux plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
