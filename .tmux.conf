# Enable focus events so Neovim gets FocusLost/FocusGained
set -g focus-events on

# Enable true color support
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Mouse
set -g mouse on

# Kanagawa Wave pane styling
# Active pane: Kanagawa Wave bg
set -g window-active-style 'fg=default,bg=#1F1F28'
# Inactive pane: noticeably lighter (sumiInk5 #363646) with dimmed text
set -g window-style 'fg=#727169,bg=#363646'

# Pane borders - Kanagawa colors
set -g pane-border-style 'fg=#54546D'
set -g pane-active-border-style 'fg=#7E9CD8'

set-option -g history-limit 5000

# tmux plugins
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
